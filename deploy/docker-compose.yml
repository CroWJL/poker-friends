version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: poker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: poker_friends
      POSTGRES_USER: poker
      POSTGRES_PASSWORD: poker123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: poker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../server
      dockerfile: Dockerfile
    container_name: poker-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/poker_friends
      DB_USER: poker
      DB_PASSWORD: poker123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

  nginx:
    image: nginx:1.27-alpine
    container_name: poker-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
